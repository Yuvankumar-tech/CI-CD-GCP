steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-t'
  - 'us-central1-docker.pkg.dev/project-a6517156-5d0f-4642-954/my-repo/app:latest'
  - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - 'us-central1-docker.pkg.dev/project-a6517156-5d0f-4642-954/my-repo/app:latest'

images:
- 'us-central1-docker.pkg.dev/project-a6517156-5d0f-4642-954/my-repo/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY